name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub stats
        env:
          GITHUB_USERNAME: Jaguar000212
          GITHUB_TOKEN: ${{ secrets.STATS_GITHUB_TOKEN }}
        run: node scripts/fetch-github-repos.js

      - name: Commit updated stats if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/staticGithubData.json
          git diff --staged --quiet || git commit -m "chore: update GitHub stats [automated]"
          git push
