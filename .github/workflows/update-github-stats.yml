name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch GitHub stats
        env:
          GITHUB_USERNAME: Jaguar000212
          GITHUB_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
        run: bun scripts/fetch-github-repos.js

      - name: Commit updated stats if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/staticGithubData.json
          git diff --staged --quiet || git commit -m "chore: update GitHub stats [automated]"
          git push

      - name: Checkout jaguar000212.github.io
        uses: actions/checkout@v4
        with:
          repository: Jaguar000212/jaguar000212.github.io
          token: ${{ secrets.PAGES_REPO_TOKEN }}
          path: pages-repo

      - name: Sync stats to jaguar000212.github.io
        run: |
          mkdir -p pages-repo/data
          cp public/data/staticGithubData.json pages-repo/data/staticGithubData.json
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/staticGithubData.json
          git diff --staged --quiet || git commit -m "chore: update GitHub stats [automated]"
          git push
